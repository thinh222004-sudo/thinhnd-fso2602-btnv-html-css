<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Form</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Mulish:ital,wght@0,200..1000;1,200..1000&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="bai2.css" />
  </head>
  <body>
    <div class="login-wraper">
      <h1 class="login-title">Login</h1>
      <div class="login-container">
        <form class="login-form">
          <div class="form-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              placeholder="example@email.com"
              required
            />
          </div>

          <div class="form-group">
            <div class="label-row">
              <label for="password">Password</label>
              <a href="#" class="forgot-link">Forgot password?</a>
            </div>
            <input
              type="password"
              id="password"
              placeholder="************"
              required
            />
          </div>

          <button type="button" class="btn-login">Login</button>
        </form>
        <p class="signup-text">
          Don’t have account? <a href="#">Create new account</a>
        </p>
      </div>
    </div>
  </body>
</html>
