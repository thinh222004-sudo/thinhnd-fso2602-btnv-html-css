<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Info</title>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap");
    </style>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <link rel="stylesheet" href="bai1.css" />
  </head>
  <body>
    <div class="flex-row container">
      <div class="flex-row product-group">
        <img
          src="./img/image 1.png"
          alt="Razer Kraken Kitty Edt Gaming Headset Quartz"
        />
        <div class="flex-column product-info-group">
          <div class="product-info-title">
            <span class="poppins-14-600 badge">Free shipping</span>
            <p class="poppins-24-600 product-name">
              Razer Kraken Kitty Edt Gaming Headset Quartz
            </p>
          </div>
          <div class="flex-column product-price-group">
            <span class="old-price roboto-18-400"> 1 599,000 </span>
            <span class="price poppins-48-700"> 799,000 </span>
            <p class="exp-date poppins-14-400">
              The offer is valid until April 3 or as long as stock lasts!
            </p>
          </div>
          <button class="btn-primary poppins-18-500">Add to cart</button>
          <div class="product-quantity flex-row poppins-14-400">
            <i class="fa-solid fa-circle" style="color: rgb(0, 217, 139)"></i>
            <span>50+ pcs. in stock.</span>
          </div>
          <div class="btn-secondary-group flex-row">
            <button class="add-to-cart flex-row poppins-18-400">
              <i class="fa-solid fa-scale-balanced"></i>
              Add to cart
            </button>
            <button class="add-to-wishlist flex-row poppins-18-400">
              <i class="fa-regular fa-heart"></i>
              Add to wishlist
            </button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
