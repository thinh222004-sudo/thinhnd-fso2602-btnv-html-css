<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Champion</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap");
    </style>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="hero-banner">
      <img class="image-banner" src="./imgs/sona.jpg" alt="Hero Banner" />
    </header>
    <div class="main-nav">
      <img src="./imgs/LOL.png" alt="" />
      <ul class="nav-container">
        <li class="nav-title"><a href="#">Game</a></li>
        <li class="nav-title"><a href="#">Champions</a></li>
        <li class="nav-title"><a href="#">News</a></li>
        <li class="nav-title"><a href="#">PatchNotes</a></li>
        <li class="nav-title"><a href="#">Discover</a></li>
        <li class="nav-title"><a href="#">Esports</a></li>
        <li class="nav-title"><a href="#">Universe</a></li>
      </ul>
    </div>
    <div class="champion-grid">
      <div class="card">
        <img class="champion-image" src="./imgs/ahri.jpg" alt="" />
        <div class="champion-name">Ahri</div>
      </div>
      <div class="card">
        <img class="champion-image" src="./imgs/akali.png" alt="" />
        <div class="champion-name">Akali</div>
      </div>
      <div class="card">
        <img class="champion-image" src="./imgs/azir.png" alt="" />
        <div class="champion-name">Azir</div>
      </div>
      <div class="card">
        <img class="champion-image" src="./imgs/caitlyn.png" alt="" />
        <div class="champion-name">Caitlyn</div>
      </div>
      <div class="card">
        <img class="champion-image" src="./imgs/darius.png" alt="" />
        <div class="champion-name">Darius</div>
      </div>
      <div class="card">
        <img class="champion-image" src="./imgs/fizz.png" alt="" />
        <div class="champion-name">Fizz</div>
      </div>
      <div class="card">
        <img class="champion-image" src="./imgs/irelia.png" alt="" />
        <div class="champion-name">Irelia</div>
      </div>
      <div class="card">
        <img class="champion-image" src="./imgs/jinx.png" alt="" />
        <div class="champion-name">Jinx</div>
      </div>
      <div class="card">
        <img class="champion-image" src="./imgs/renga.png" alt="" />
        <div class="champion-name">Rengar</div>
      </div>
      <div class="card">
        <img class="champion-image" src="./imgs/seraphine.png" alt="" />
        <div class="champion-name">Seraphine</div>
      </div>
      <div class="card">
        <img class="champion-image" src="./imgs/yasuo.png" alt="" />
        <div class="champion-name">Yasuo</div>
      </div>
      <div class="card">
        <img class="champion-image" src="./imgs/wukong.png" alt="" />
        <div class="champion-name">Wukong</div>
      </div>
    </div>
    <section class="video-banner">
      <div class="video-reponsive">
        <iframe
          width="560"
          height="315"
          src="https://www.youtube.com/embed/O4PDzBnBMU4?si=F9TreHjBfn8d_3sj"
          title="YouTube video player"
          frameborder="0"
          allow="
            accelerometer;
            autoplay;
            clipboard-write;
            encrypted-media;
            gyroscope;
            picture-in-picture;
            web-share;
          "
          referrerpolicy="strict-origin-when-cross-origin"
          allowfullscreen
        ></iframe>
      </div>
    </section>
    <footer class="signin-container">
      <p class="reserved">© 2021 All Rights Reserved</p>
      <div class="signin">
        <form action="input">
          <input
            type="text"
            name="email-address"
            id="email-address"
            placeholder="Email Address"
          />
          <button class="play">Play For Free</button>
        </form>
      </div>
    </footer>
  </body>
</html>
