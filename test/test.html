<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Design Daily</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap");
    </style>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="container">
      <div class="rectagle-shape"></div>
      <div class="main-content">
        <div class="search-content">
          <div class="flex-row-searching">
            <img src="./imgs/search.png" alt="search" />
            <input
              class="placeholder-search"
              type="search"
              name="search"
              placeholder="Search for a part-time job"
            />
          </div>
          <div class="flex-row-button-map">
            <img src="./imgs/map.png" alt="map" />
            <button class="button-use-map">Use map</button>
          </div>
        </div>
        <div class="card-group">
          <div class="card-items">
            <img class="img-items" src="./imgs/furniture.png" alt="furniture" />
            <p class="text-card">Furniture</p>
          </div>
          <div class="card-items">
            <img class="img-items" src="./imgs/property.png" alt="property" />
            <p class="text-card">Property</p>
          </div>
          <div class="card-items">
            <img class="img-items" src="./imgs/job.png" alt="job" />
            <p class="text-card">Job</p>
          </div>
          <div class="card-items">
            <img class="img-items" src="./imgs/travel.png" alt="travel" />
            <p class="text-card">Travel</p>
          </div>
          <div class="card-items">
            <img class="img-items" src="./imgs/boat.png" alt="boat" />
            <p class="text-card">Boat</p>
          </div>
          <div class="card-items">
            <img class="img-items" src="./imgs/mc.png" alt="mc" />
            <p class="text-card">MC</p>
          </div>
          <div class="card-items">
            <img class="img-items" src="./imgs/economy.png" alt="economy" />
            <p class="text-card">Economy</p>
          </div>
          <div class="card-items">
            <img class="img-items" src="./imgs/holiday.png" alt="holiday" />
            <p class="text-card">Holiday</p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
